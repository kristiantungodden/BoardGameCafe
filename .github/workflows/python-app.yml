name: Python Application Testing

on:
  push:
    branches: [ "main", "develop" ]
  pull_request:
    branches: [ "main" ]

jobs:
  test:
    runs-on: ubuntu-latest

    steps:
    - name: Checkout code
      uses: actions/checkout@v4

    - name: Set up Python 3.11
      uses: actions/setup-python@v4
      with:
        python-version: "3.11"

    - name: Install dependencies
      run: |
        python -m pip install --upgrade pip
        # Path points to your subdirectory requirements
        if [ -f boardgame_cafe/requirements.txt ]; then pip install -r boardgame_cafe/requirements.txt; fi
        pip install pytest pytest-cov

    - name: Run Tests with Pytest
      working-directory: ./boardgame_cafe
      env:
        # Set any necessary environment variables here, e.g.:
        # DATABASE_URL: ${{ secrets.DATABASE_URL }}
      run: |
        # This runs pytest using the configuration in boardgame_cafe/pytest.ini
        pytest tests/
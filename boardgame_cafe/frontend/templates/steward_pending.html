{% extends "base.html" %}

{% block title %}Pending Reservations{% endblock %}

{% block content %}
<section class="steward-dashboard">
	<header class="steward-hero">
		<div>
			<h1 class="page-header">Pending Reservations</h1>
			<p class="page-intro compact">Reservations awaiting action.</p>
		</div>
		<div class="steward-hero-actions">
			<a class="button" href="/steward">Back to Dashboard</a>
		</div>
	</header>

	<section class="steward-layout">
		<div class="steward-main-grid">
			<section class="card">
				<div id="pending-list" class="steward-scroll-list">(loading...)</div>
			</section>
		</div>

		<aside class="card steward-side-panel" id="reservation-sidepanel">
			<h3>Reservation Details</h3>
			<div id="reservation-panel-content">Select a reservation to view/edit.</div>
		</aside>
	</section>
</section>
<script src="{{ url_for('static', filename='js/steward.js', v='20260425-1') }}"></script>
{% endblock %}

{% extends "base.html" %}

{% block title %}BoardGameCafe | My Account{% endblock %}

{% block content %}
<h1 class="page-header">My Account</h1>
<p class="page-intro">You are currently signed in.</p>

<div class="panel-grid">
	<div class="panel">
		<h3>Name</h3>
		<p>{{ user.name }}</p>
	</div>
	<div class="panel">
		<h3>Email</h3>
		<p>{{ user.email }}</p>
	</div>
	<div class="panel">
		<h3>Role</h3>
		<p>{{ user.role }}</p>
	</div>
	<div class="panel">
		<h3>Phone</h3>
		<p>{{ user.phone or "Not set" }}</p>
	</div>
</div>

<div class="action-row" style="margin-top: 1rem;">
	<a class="button button-secondary" href="/">Back Home</a>
	<form method="post" action="/auth/logout?ui=1" class="inline-form">
		<button class="button" type="submit">Logout</button>
	</form>
</div>
{% endblock %}

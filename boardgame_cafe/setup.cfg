[tool:pytest]
testpaths = tests
python_files = test_*.py

[coverage:run]
source = src
omit = 
    */tests/*
    */migrations/*

[flake8]
max-line-length = 100
exclude = .git,__pycache__,venv,migrations
ignore = E501,W503

[mypy]
python_version = 3.11
warn_return_any = True
warn_unused_configs = True
disallow_untyped_defs = False

[isort]
profile = black
multi_line_mode = 3
include_trailing_comma = True
force_grid_wrap = 0
use_parentheses = True
line_length = 100

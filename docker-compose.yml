services:
  redis:
    image: redis:7-alpine
    container_name: boardgame-cafe-redis
    command: ["redis-server", "--appendonly", "yes"]
    ports:
      - "6379:6379"
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 20

  seed:
    build:
      context: .
      dockerfile: boardgame_cafe/Dockerfile
    container_name: boardgame-cafe-seed
    depends_on:
      redis:
        condition: service_healthy
    environment:
      FLASK_ENV: development
      CELERY_BROKER_URL: redis://redis:6379/0
      CELERY_RESULT_BACKEND: redis://redis:6379/1
      REDIS_URL: redis://redis:6379/2
      REALTIME_EVENTS_CHANNEL: boardgame_cafe.events
    command: ["python", "boardgame_cafe/scripts/seed_demo_data.py"]
    restart: "no"

  web:
    build:
      context: .
      dockerfile: boardgame_cafe/Dockerfile
    container_name: boardgame-cafe-web
    depends_on:
      redis:
        condition: service_healthy
      seed:
        condition: service_completed_successfully
    environment:
      FLASK_ENV: development
      FLASK_HOST: 0.0.0.0
      FLASK_PORT: "5000"
      CELERY_BROKER_URL: redis://redis:6379/0
      CELERY_RESULT_BACKEND: redis://redis:6379/1
      REDIS_URL: redis://redis:6379/2
      REALTIME_EVENTS_CHANNEL: boardgame_cafe.events
    ports:
      - "5000:5000"
    command: ["python", "-m", "flask", "--app", "run.py", "run", "--debug", "--host=0.0.0.0", "--port=5000"]

  worker:
    build:
      context: .
      dockerfile: boardgame_cafe/Dockerfile
    container_name: boardgame-cafe-worker
    depends_on:
      redis:
        condition: service_healthy
      seed:
        condition: service_completed_successfully
    environment:
      FLASK_ENV: development
      PYTHONPATH: /app/boardgame_cafe/src
      CELERY_BROKER_URL: redis://redis:6379/0
      CELERY_RESULT_BACKEND: redis://redis:6379/1
      REDIS_URL: redis://redis:6379/2
      REALTIME_EVENTS_CHANNEL: boardgame_cafe.events
      MAIL_SERVER: ${MAIL_SERVER:-localhost}
      MAIL_PORT: ${MAIL_PORT:-465}
      MAIL_USE_SSL: ${MAIL_USE_SSL:-false}
      MAIL_USE_TLS: ${MAIL_USE_TLS:-false}
      MAIL_USERNAME: ${MAIL_USERNAME:-}
      MAIL_PASSWORD: ${MAIL_PASSWORD:-}
      MAIL_DEFAULT_SENDER: ${MAIL_DEFAULT_SENDER:-}
    command: ["python", "-m", "celery", "-A", "celery_worker.celery_app", "worker", "-l", "info"]
